<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projet : Qui est-ce ?</title>
    <link rel="stylesheet" href="style_jeu.css">
</head>
<body>
    <h1>Qui est-ce ?</h1>
    
    <div id="main">
        <div id="col-gauche">
            <div class="panel-label">EVOKERS & TARGETS</div>
            <div id="grille-persos"></div>
        </div>

        <div id="col-droite">
            <div class="panel-label">ANALYSIS SYSTEM</div>
            <div id="questions-container"></div>
            <div class="action-row">
                <button onclick="resetGame()" class="btn-reset">RELOAD SESSION</button>
            </div>
            <div id="message">Initialisation...</div>
        </div>
    </div>

    <script>
        const questions = [
            "A-t-il des lunettes ?", "A-t-il une moustache ?", "A-t-il un chapeau ?",
            "A-t-il des cheveux ?", "A-t-il une boucle d'oreille ?", "A-t-il une barbe ?",
            "A-t-il un nœud papillon ?"
        ];

        // Vérifie bien que ces noms correspondent à tes fichiers dans /img
        const characterCodes = [
            "0000000", "0001111", "0010011", "0011100", "0100101", 
            "0101010", "0110110", "0111001", "1000110", "1001101", 
            "1010101", "1011010", "1100011", "1110000", "1111111"
        ];

        let userAnswers = Array(7).fill(null);

        function init() {
            renderQuestions();
            update();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = questions.map((q, i) => `
                <div class="question-bloc">
                    <p>${i + 1}. ${q}</p>
                    <button id="btn-${i}-1" onclick="setAns(${i}, '1')">OUI</button>
                    <button id="btn-${i}-0" onclick="setAns(${i}, '0')">NON</button>
                </div>
            `).join('');
        }

        function setAns(index, val) {
            userAnswers[index] = val;
            update();
        }

        function resetGame() {
            userAnswers.fill(null);
            update();
        }

        function update() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            
            // Calcul des scores
            const results = characterCodes.map(code => {
                let diff = 0;
                let syndrome = [];
                userAnswers.forEach((ans, i) => {
                    if (ans !== null && code[i] !== ans) {
                        diff++;
                        syndrome.push("Q" + (i+1));
                    }
                });
                return { code, diff, syndrome };
            });

            // On cherche le score minimum (le perso qui ressemble le plus)
            const minDiff = Math.min(...results.map(r => r.diff));

            // Mise à jour de la Grille
            const grille = document.getElementById('grille-persos');
            grille.innerHTML = characterCodes.map((code, i) => {
                const res = results[i];
                let classes = "perso-card";
                if (answeredCount === 7 && res.diff === minDiff && res.diff <= 2) classes += " winner";
                return `<div class="${classes}"><img src="img/${code}.png"><br>Sujet ${i+1}</div>`;
            }).join('');

            // Mise à jour des Boutons (pour voir sur quoi on a cliqué)
            for(let i=0; i<7; i++) {
                document.getElementById(`btn-${i}-1`).className = userAnswers[i] === '1' ? 'is-selected' : '';
                document.getElementById(`btn-${i}-0`).className = userAnswers[i] === '0' ? 'is-selected' : '';
            }

            // Message
            const msg = document.getElementById('message');
            if (answeredCount < 7) {
                msg.innerText = `Analyse : ${answeredCount}/7 données collectées...`;
            } else {
                const winners = results.filter(r => r.diff === minDiff);
                msg.innerText = minDiff > 2 ? "ERREUR : Trop de mensonges détectés." : `Cible détectée (${minDiff} erreur(s))`;
            }
        }
        init();
    </script>
</body>
</html>
