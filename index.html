<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qui est-ce ? | Persona 3 Reload Edition</title>
    <link rel="stylesheet" href="style_jeu.css">
</head>
<body>
    <h1>Qui est-ce ?</h1>
    
    <div id="main">
        <div id="col-gauche">
            <div class="panel-label">EVOKERS & TARGETS</div>
            <div id="grille-persos">
                </div>
        </div>

        <div id="col-droite">
            <div class="panel-label">ANALYSIS</div>
            <div id="questions-container">
                </div>

            <div class="action-row">
                <button onclick="resetGame()" class="btn-p3-reset">RELOAD SESSION</button>
            </div>

            <div id="message">Initialisation de l'analyse...</div>
        </div>
    </div>

    <div class="p3-footer">
        <div class="p3-line"></div>
        <div class="p3-clock">THE DARK HOUR</div>
    </div>

    <script>
        const questions = [
            "A-t-il des lunettes ?",
            "A-t-il une moustache ?",
            "A-t-il un chapeau ?",
            "A-t-il des cheveux ?",
            "A-t-il une boucle d'oreille ?",
            "A-t-il une barbe ?",
            "A-t-il un nœud papillon ?"
        ];

        // IMPORTANT : Liste EXACTE de tes fichiers images .png
        const characterCodes = [
            "0000000", "0001111", "0010011", "0011100", "0100101", 
            "0101010", "0110110", "0111001", "1000110", "1001101", 
            "1010101", "1011010", "1100011", "1110000", "1111111"
        ];

        let userAnswers = Array(questions.length).fill(null);
        const maxLies = 2;

        function initGame() {
            renderQuestions();
            updateDisplay();
        }

        function renderQuestions() {
            const container = document.getElementById('questions-container');
            container.innerHTML = questions.map((q, i) => `
                <div class="question-bloc">
                    <h2>${i + 1}. ${q}</h2>
                    <div class="btn-groupe">
                        <button id="q${i}y" onclick="setAnswer(${i}, '1')">OUI</button>
                        <button id="q${i}n" onclick="setAnswer(${i}, '0')">NON</button>
                    </div>
                </div>
            `).join('');
        }

        function setAnswer(index, value) {
            userAnswers[index] = value;
            updateDisplay();
        }

        function resetGame() {
            userAnswers = Array(questions.length).fill(null);
            updateDisplay();
        }

        function updateDisplay() {
            const answeredCount = userAnswers.filter(a => a !== null).length;
            const allAnswered = answeredCount === questions.length;
            
            let charactersData = characterCodes.map((code, index) => {
                let mismatches = 0;
                let syndrome = [];
                userAnswers.forEach((ans, i) => {
                    if (ans !== null && code[i] !== ans) {
                        mismatches++;
                        syndrome.push(`Q${i + 1}`);
                    }
                });
                return { name: `Sujet ${index + 1}`, code, image: `img/${code}.png`, mismatches, syndrome };
            });

            const compatible = charactersData.filter(c => c.mismatches <= maxLies);
            compatible.sort((a, b) => a.mismatches - b.mismatches);
            const minMismatches = compatible.length > 0 ? compatible[0].mismatches : null;

            const grille = document.getElementById('grille-persos');
            grille.innerHTML = charactersData.map(c => {
                let statusClass = "";
                if (allAnswered && minMismatches !== null && c.mismatches === minMismatches) {
                    statusClass = "winner";
                }
                return `
                    <div class="perso-card ${statusClass}" title="${c.syndrome.length > 0 ? 'Mensonges: ' + c.syndrome.join(', ') : ''}">
                        <img src="${c.image}" alt="${c.name}">
                        <span class="perso-nom">${c.name}</span>
                    </div>
                `;
            }).join('');

            const msgBox = document.getElementById('message');
            if (answeredCount === 0) {
                msgBox.innerText = "En attente de données. Max 2 mensonges tolérés.";
            } else if (!allAnswered) {
                msgBox.innerText = `Analyse en cours : ${answeredCount}/7 questions.`;
            } else if (minMismatches === null) {
                msgBox.innerText = "CRITICAL ERROR: Aucun sujet compatible.";
            } else {
                const found = charactersData.filter(c => c.mismatches === minMismatches);
                msgBox.innerText = `Cible identifiée : ${found[0].name}. Erreurs détectées : ${found[0].syndrome.join(', ') || '0'}.`;
            }

            userAnswers.forEach((ans, i) => {
                document.getElementById(`q${i}y`).className = ans === '1' ? 'is-selected' : '';
                document.getElementById(`q${i}n`).className = ans === '0' ? 'is-selected' : '';
            });
        }

        window.onload = initGame;
    </script>
</body>
</html>
